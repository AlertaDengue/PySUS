version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    build:
      html:
        - cd docs && make html
        - mkdir -p $READTHEDOCS_OUTPUT/html/
        - cp -r docs/build/html/. $READTHEDOCS_OUTPUT/html/

sphinx:
  configuration: docs/source/conf.py

python:
  install:
    - method: pip
      path: .
    - requirements: docs/requirements.txt
