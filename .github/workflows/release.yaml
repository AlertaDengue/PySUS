name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag for Docker image (e.g., 9.9.9-test)"
        required: false
        type: string
  push:
    branches: [main]
    tags:
      - "[0-9]*"
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install poetry
      run: pipx install poetry

    - uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Test release
      if: ${{ github.event_name != 'workflow_dispatch' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: make release-dry

    - name: Release
      if: ${{ github.event_name == 'workflow_dispatch' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
      run: |
        poetry config pypi-token.pypi ${PYPI_TOKEN}
        make release

  docker-push:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: alertadengue
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Extract version
      id: version
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
        else
          echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
        fi

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: docker/Dockerfile
        push: true
        tags: |
          alertadengue/pysus:latest
          alertadengue/pysus:${{ steps.version.outputs.tag }}

  docs:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash -l {0}

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - uses: actions/checkout@v4

    - uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-version: latest
        environment-file: conda/dev.yaml
        channels: conda-forge,nodefaults
        activate-environment: pysus
        auto-update-conda: true
        conda-solver: libmamba

    - name: Install dependencies
      run: |
        pip install poetry poetry-plugin-export
        poetry config virtualenvs.create false
        poetry install --with docs --extras dbc

    - name: Build docs
      run: |
        cd docs
        make html

    - name: Configure GitHub Pages
      if: github.ref == 'refs/heads/main'
      uses: actions/configure-pages@v5

    - name: Upload artifact
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-pages-artifact@v3
      with:
        path: docs/build/html

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main'
      id: deployment
      uses: actions/deploy-pages@v4
